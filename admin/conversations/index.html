<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sohbetler Dashboard</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f4f6fb;
        color: #111827;
      }

      .layout {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: 240px;
        height: 100vh;
        padding: 32px 24px;
        background: linear-gradient(180deg, #111827 0%, #1f2937 100%);
        color: #f9fafb;
        display: flex;
        flex-direction: column;
        gap: 32px;
        overflow-y: auto;
        z-index: 100;
      }

      .sidebar h1 {
        font-size: 1.4rem;
        margin: 0;
      }

      .nav-links {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .nav-links a {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 10px;
        color: inherit;
        text-decoration: none;
        font-weight: 600;
        transition: background 0.2s ease, transform 0.2s ease;
      }

      .nav-links a:hover {
        background: rgba(255, 255, 255, 0.08);
        transform: translateX(4px);
      }

      .nav-links a.active {
        background: rgba(79, 70, 229, 0.25);
        color: #c7d2fe;
      }

      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        margin-left: 240px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 24px 32px;
        background: #fff;
        box-shadow: 0 1px 0 rgba(15, 23, 42, 0.08);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      header h2 {
        margin: 0;
        font-size: 1.5rem;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      header button {
        border: none;
        border-radius: 10px;
        padding: 10px 16px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        background: #1f2937;
        color: #fff;
        transition: opacity 0.2s ease;
      }

      header button:hover {
        opacity: 0.9;
      }

      .button-secondary {
        background: #f3f4f6;
        color: #1f2937;
      }

      .button-secondary:hover {
        box-shadow: 0 12px 28px rgba(107, 114, 128, 0.25);
      }

      main {
        padding: 32px;
        max-width: 100%;
        width: 100%;
        margin: 0 auto;
        display: grid;
        gap: 28px;
      }

      .status-banner {
        padding: 12px 18px;
        border-radius: 12px;
        font-size: 0.95rem;
        background: rgba(99, 102, 241, 0.08);
        color: #312e81;
      }

      .panel {
        background: #fff;
        border-radius: 18px;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
        overflow: hidden;
      }

      .panel-header {
        padding: 20px 24px;
        border-bottom: 1px solid #e5e7eb;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .panel-header h2 {
        margin: 0;
        font-size: 1.2rem;
      }

      .panel-body {
        padding: 24px;
        text-align: center;
        color: #6b7280;
      }

      .conversations-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 18px;
        padding: 24px;
      }

      .conversation-card {
        background: #fff;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
        display: grid;
        gap: 10px;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        position: relative;
      }

      .conversation-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 22px 45px rgba(15, 23, 42, 0.12);
      }

      .conversation-label {
        font-size: 0.875rem;
        font-weight: 600;
        color: #4b5563;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .conversation-value {
        font-size: 1.1rem;
        font-weight: 600;
        color: #111827;
        word-break: break-all;
      }

      .conversation-count {
        font-size: 2.5rem;
        font-weight: 700;
        color: #111827;
      }

      .conversation-subtitle {
        font-size: 0.85rem;
        color: #6b7280;
      }

      .conversation-card-top-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
      }

      .conversation-card-main {
        display: grid;
        gap: 6px;
      }

      .conversation-new-messages {
        margin-top: 6px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        border-radius: 999px;
        font-size: 0.85rem;
        font-weight: 700;
        color: #ffffff;
        background: linear-gradient(135deg, #c99cd8, #c4c0ff, #f7cdff);
        box-shadow: 0 10px 25px rgba(79, 70, 229, 0.35);
        letter-spacing: 0.04em;
        text-transform: uppercase;
        animation: newMessagePulse 1.6s ease-in-out infinite;
        width: 80%;
      }

      .conversation-new-messages::before {
        content: "●";
        font-size: 0.9rem;
        color: #ffbbbb;
      }

      .conversation-feedback-row {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
        flex-wrap: wrap;
      }

      .thumb-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 800;
        letter-spacing: 0.02em;
        box-shadow: 0 10px 22px rgba(15, 23, 42, 0.10);
      }

      .thumb-badge.thumb-up {
        color: #064e3b;
        background: linear-gradient(135deg, rgba(34, 197, 94, 0.25), rgba(16, 185, 129, 0.18));
        border: 1px solid rgba(16, 185, 129, 0.35);
      }

      .thumb-badge.thumb-down {
        color: #7f1d1d;
        background: linear-gradient(135deg, rgba(239, 68, 68, 0.22), rgba(244, 114, 182, 0.14));
        border: 1px solid rgba(239, 68, 68, 0.35);
      }

      .feedback-icon {
        width: 30px;
        height: 30px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.22), rgba(236, 72, 153, 0.18));
        border: 1px solid rgba(99, 102, 241, 0.35);
        color: #312e81;
        box-shadow: 0 10px 22px rgba(79, 70, 229, 0.22);
        font-size: 0.95rem;
      }

      @keyframes newMessagePulse {
        0% {
          transform: translateY(0) scale(1);
          box-shadow: 0 8px 20px rgba(79, 70, 229, 0.25);
        }
        50% {
          transform: translateY(-1px) scale(1.03);
          box-shadow: 0 14px 32px rgba(236, 72, 153, 0.5);
        }
        100% {
          transform: translateY(0) scale(1);
          box-shadow: 0 8px 20px rgba(79, 70, 229, 0.25);
        }
      }

      .conversation-last-used {
        font-size: 0.8rem;
        color: #9ca3af;
        margin-top: 4px;
      }

      .empty-state {
        padding: 48px 24px;
        text-align: center;
        color: #6b7280;
      }

      .conversation-card {
        cursor: pointer;
      }

      body.modal-open {
        overflow: hidden;
      }

      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.2s ease, visibility 0.2s ease;
      }

      .modal-overlay.show {
        opacity: 1;
        visibility: visible;
      }

      .modal-content {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 900px;
        width: 90%;
        max-height: 90vh;
        display: flex;
        flex-direction: column;
        transform: scale(0.95);
        transition: transform 0.2s ease;
      }

      .modal-overlay.show .modal-content {
        transform: scale(1);
      }

      .modal-header {
        padding: 20px 24px;
        border-bottom: 1px solid #e5e7eb;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .modal-header h3 {
        margin: 0;
        font-size: 1.25rem;
        color: #111827;
      }

      .messages-tick-btn {
        border: none;
        background: linear-gradient(135deg, #e0f2fe, #dbeafe);
        color: #1e293b;
        padding: 8px 20px;
        border-radius: 999px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.9rem;
        font-weight: 600;
        line-height: 1;
        gap: 6px;
        transition: transform 0.08s ease, box-shadow 0.15s ease, background 0.2s ease, color 0.2s ease;
        user-select: none;
        flex: 0 0 auto;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
        letter-spacing: 0.02em;
      }

      .messages-tick-btn::before {
        content: "☐";
        font-size: 1.15rem;
      }

      .messages-tick-btn span {
        white-space: nowrap;
      }

      .messages-tick-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 26px rgba(37, 99, 235, 0.3);
        background: linear-gradient(135deg, #dbeafe, #ede9fe);
      }

      .messages-tick-btn:active {
        transform: translateY(0);
        box-shadow: 0 6px 14px rgba(15, 23, 42, 0.15);
      }

      .messages-tick-btn.is-checked {
        background: linear-gradient(135deg, #4f46e5, #22c55e);
        color: #f9fafb;
        box-shadow: 0 14px 30px rgba(79, 70, 229, 0.45);
      }

      .messages-tick-btn.is-checked::before {
        content: "☑";
      }

      .conversation-tick-btn {
        border: none;
        background: linear-gradient(135deg, #e0f2fe, #dbeafe);
        color: #1e293b;
        width: 34px;
        height: 34px;
        border-radius: 999px;
        cursor: default;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        line-height: 1;
        transition: transform 0.08s ease, box-shadow 0.15s ease, background 0.2s ease, color 0.2s ease;
        user-select: none;
        flex: 0 0 auto;
        box-shadow: 0 6px 16px rgba(15, 23, 42, 0.16);
        pointer-events: none;
      }

      .conversation-tick-btn::before {
        content: "☐";
      }

      .conversation-tick-btn.is-checked {
        background: linear-gradient(135deg, #4f46e5, #22c55e);
        color: #f9fafb;
        box-shadow: 0 12px 26px rgba(79, 70, 229, 0.45);
      }

      .conversation-tick-btn.is-checked::before {
        content: "☑";
      }

      .conversation-tick-btn:disabled,
      .messages-tick-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        box-shadow: none;
        transform: none;
      }

      .modal-body {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 24px;
        background: #f9fafb;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .message {
        display: flex;
        gap: 12px;
        max-width: 75%;
        animation: fadeIn 0.3s ease;
        word-wrap: break-word;
        overflow-wrap: break-word;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.user {
        align-self: flex-end;
        flex-direction: row-reverse;
      }

      .message.ai {
        align-self: flex-start;
        position: relative;
        width: 70% ;
      }

      .message.ai .message-bubble {
        position: relative;
      }

      .message.ai {
        position: relative;
      }

      .message-bubble {
        padding: 12px 16px;
        border-radius: 18px;
        word-wrap: break-word;
        overflow-wrap: break-word;
        line-height: 1.5;
        position: relative;
        max-width: 100%;
        box-sizing: border-box;
      }

      .message.user .message-bubble {
        background: #6366f1;
        color: #fff;
        border-bottom-right-radius: 4px;
      }

      .message.ai .message-bubble {
        background: #fff;
        color: #111827;
        border: 1px solid #e5e7eb;
        border-bottom-left-radius: 4px;
      }

      .message-content {
        font-size: 0.95rem;
      }

      .message.ai .message-content {
        white-space: normal;
      }

      .message.ai .message-content h1,
      .message.ai .message-content h2,
      .message.ai .message-content h3,
      .message.ai .message-content h4,
      .message.ai .message-content h5,
      .message.ai .message-content h6 {
        margin-top: 0.5em;
        margin-bottom: 0.5em;
        font-weight: 600;
      }

      .message.ai .message-content h1 {
        font-size: 1.3em;
      }

      .message.ai .message-content h2 {
        font-size: 1.2em;
      }

      .message.ai .message-content h3 {
        font-size: 1.1em;
      }

      .message.ai .message-content p {
        margin: 0.5em 0;
      }

      .message.ai .message-content p:first-child {
        margin-top: 0;
      }

      .message.ai .message-content p:last-child {
        margin-bottom: 0;
      }

      .message.ai .message-content ul,
      .message.ai .message-content ol {
        margin: 0.5em 0;
        padding-left: 1.5em;
      }

      .message.ai .message-content li {
        margin: 0.25em 0;
      }

      .message.ai .message-content code {
        background: #f3f4f6;
        padding: 2px 6px;
        border-radius: 4px;
        font-family: 'Courier New', monospace;
        font-size: 0.9em;
      }

      .message.ai .message-content pre {
        background: #1f2937;
        color: #f9fafb;
        padding: 12px;
        border-radius: 8px;
        overflow-x: auto;
        margin: 0.5em 0;
      }

      .message.ai .message-content pre code {
        background: transparent;
        padding: 0;
        color: inherit;
      }

      .message.ai .message-content blockquote {
        border-left: 4px solid #6366f1;
        padding-left: 1em;
        margin: 0.5em 0;
        color: #6b7280;
      }

      .message.ai .message-content a {
        color: #6366f1;
        text-decoration: none;
      }

      .message.ai .message-content a:hover {
        text-decoration: underline;
      }

      .message.ai .message-content strong {
        font-weight: 600;
      }

      .message.ai .message-content em {
        font-style: italic;
      }

      .ai-flow-btn {
        margin-top: 4px;
        padding: 8px 16px;
        font-size: 0.9rem;
        font-weight: 600;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: #f9fafb;
        color: #6366f1;
        cursor: pointer;
        transition: all 0.2s ease;
        align-self: flex-start;
      }

      .ai-flow-btn:hover {
        background: #f3f4f6;
        border-color: #6366f1;
      }

      .ai-flow-popup {
        margin-top: -50px;  /* Change last used message to top of the screen */
        position: fixed;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        padding: 24px;
        width: 600px;
        max-width: calc(100vw - 100px);
        max-height: 70vh;
        overflow-y: auto;
        overflow-x: hidden;
        z-index: 2000;
        opacity: 0;
        visibility: hidden;
        transform: translateX(-10px);
        transition: opacity 0.2s ease, visibility 0.2s ease, transform 0.2s ease;
      }

      .ai-flow-popup.show {
        opacity: 1;
        visibility: visible;
        transform: translateX(0);
      }

      @media (max-width: 1200px) {
        .ai-flow-popup {
          width: 500px;
          max-width: calc(100vw - 80px);
        }
      }

      @media (max-width: 768px) {
        .ai-flow-popup {
          left: 0;
          right: 0;
          top: calc(100% + 12px);
          width: 100%;
          max-width: 100%;
          padding: 16px;
        }
      }

      .ai-flow-popup.show {
        opacity: 1;
        visibility: visible;
        transform: translateX(0);
      }

      .ai-flow-popup-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid #e5e7eb;
      }

      .ai-flow-popup-header h4 {
        margin: 0;
        font-size: 0.9rem;
        font-weight: 600;
        color: #111827;
      }

      .ai-flow-popup-close {
        background: transparent;
        border: none;
        font-size: 1.2rem;
        color: #6b7280;
        cursor: pointer;
        padding: 0;
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        transition: background 0.2s ease, color 0.2s ease;
      }

      .ai-flow-popup-close:hover {
        background: #f3f4f6;
        color: #111827;
      }

      .ai-flow-content {
        font-family: "Monaco", "Menlo", "Ubuntu Mono", "Consolas", "source-code-pro", monospace;
        font-size: 0.9rem;
        line-height: 1.6;
        color: #111827;
        white-space: pre;
        word-wrap: break-word;
        overflow-wrap: break-word;
        background: #1e1e1e;
        padding: 20px;
        border-radius: 8px;
        overflow-x: auto;
        letter-spacing: 0;
      }

      .json-key {
        color: #9cdcfe;
      }

      .json-string {
        color: #ce9178;
      }

      .json-number {
        color: #b5cea8;
      }

      .json-boolean {
        color: #569cd6;
      }

      .json-null {
        color: #569cd6;
      }

      .json-punctuation {
        color: #d4d4d4;
      }

      .message-timestamp {
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.7);
        margin-top: 6px;
        text-align: right;
        padding-top: 4px;
      }

      .message.ai .message-timestamp {
        color: #6b7280;
      }

      .message-feedback-icons {
        margin-top: 10px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .msg-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 30px;
        height: 30px;
        border-radius: 999px;
        font-size: 0.95rem;
        box-shadow: 0 10px 22px rgba(15, 23, 42, 0.12);
        user-select: none;
      }

      .msg-icon.like {
        background: linear-gradient(135deg, rgba(34, 197, 94, 0.25), rgba(16, 185, 129, 0.18));
        border: 1px solid rgba(16, 185, 129, 0.35);
        color: #065f46;
      }

      .msg-icon.dislike {
        background: linear-gradient(135deg, rgba(239, 68, 68, 0.22), rgba(244, 114, 182, 0.14));
        border: 1px solid rgba(239, 68, 68, 0.35);
        color: #7f1d1d;
      }

      .feedback-detail-btn {
        border: none;
        cursor: pointer;
        width: 30px;
        height: 30px;
        border-radius: 999px;
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.22), rgba(236, 72, 153, 0.18));
        border: 1px solid rgba(99, 102, 241, 0.35);
        color: #312e81;
        box-shadow: 0 10px 22px rgba(79, 70, 229, 0.22);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.08s ease, box-shadow 0.15s ease;
      }

      .feedback-detail-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 30px rgba(236, 72, 153, 0.32);
      }

      .feedback-detail-btn:active {
        transform: translateY(0);
      }

      .feedback-modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 3000;
        padding: 20px;
      }

      .feedback-modal.show {
        display: flex;
      }

      .feedback-modal-card {
        width: min(560px, 95vw);
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 26px 80px rgba(0, 0, 0, 0.35);
        overflow: hidden;
      }

      .feedback-modal-header {
        padding: 16px 18px;
        border-bottom: 1px solid #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .feedback-modal-header h4 {
        margin: 0;
        font-size: 1rem;
        color: #111827;
      }

      .feedback-modal-close {
        background: transparent;
        border: none;
        cursor: pointer;
        font-size: 1.2rem;
        color: #6b7280;
        width: 30px;
        height: 30px;
        border-radius: 10px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .feedback-modal-close:hover {
        background: #f3f4f6;
        color: #111827;
      }

      .feedback-modal-body {
        padding: 16px 18px 18px;
        display: grid;
        gap: 10px;
      }

      .feedback-rating {
        font-weight: 800;
        color: #4f46e5;
      }

      .feedback-text {
        white-space: pre-wrap;
        color: #111827;
        line-height: 1.5;
      }

      .filters-container {
        background: #fff;

      // Read URL parameters on page load
      function readURLParameters() {

        if (filterAgentFlowEl) filterAgentFlowEl.checked = orFlow === "1" || orFlow === "true";

      // Group conversations according to the specified logic
      function groupConversations(data) {
        if (!data || data.length === 0) {
          return [];
        }

        const groupedConversations = [];

        // Separate rows with and without conversation_id
        const withConversationId = data.filter(row => row.conversation_id && row.conversation_id.trim() !== "");
        const withoutConversationId = data.filter(row => !row.conversation_id || row.conversation_id.trim() === "");

        // Group 1: Rows WITH conversation_id
        // Group by conversation_id, sort each group by created_at descending
        const conversationIdGroups = {};
        withConversationId.forEach(row => {
          const convId = row.conversation_id;
          if (!conversationIdGroups[convId]) {
            conversationIdGroups[convId] = [];
          }
          conversationIdGroups[convId].push(row);
        });

        // Sort each group by created_at descending (newest first)
        Object.keys(conversationIdGroups).forEach(convId => {
          conversationIdGroups[convId].sort((a, b) => {
            const dateA = new Date(a.created_at).getTime();
            const dateB = new Date(b.created_at).getTime();
            return dateB - dateA; // Descending
          });
          groupedConversations.push({
            user_id: conversationIdGroups[convId][0].user_id,
            conversation_id: convId,
            messages: conversationIdGroups[convId]
          });
        });

        // Group 2: Rows WITHOUT conversation_id
        // First group by user_id
        const userIdGroups = {};
        withoutConversationId.forEach(row => {
          const uid = row.user_id;
          if (!userIdGroups[uid]) {
            userIdGroups[uid] = [];
          }
          userIdGroups[uid].push(row);
        });

        // For each user_id group:
        Object.keys(userIdGroups).forEach(uid => {
          // Sort by created_at ascending (oldest first)
          const userMessages = userIdGroups[uid].sort((a, b) => {
            const dateA = new Date(a.created_at).getTime();
            const dateB = new Date(b.created_at).getTime();
            return dateA - dateB; // Ascending
          });

          // Find split points (time = 0 AND ai_response = "clear conversation history")
          const splitIndices = [];
          userMessages.forEach((msg, index) => {
            if (msg.time === 0 && msg.ai_response === "clear conversation history") {
              splitIndices.push(index);
            }
          });

          // Create conversation groups by splitting at these indices
          if (splitIndices.length === 0) {
            // No splits, entire array is one conversation
            groupedConversations.push({
              user_id: uid,
              conversation_id: null,
              messages: userMessages
            });
          } else {
            // Split the array
            let startIndex = 0;
            splitIndices.forEach(splitIndex => {
              // Create group from startIndex to splitIndex (excluding splitIndex)
              if (startIndex < splitIndex) {
                const conversationGroup = userMessages.slice(startIndex, splitIndex);
                groupedConversations.push({
                  user_id: uid,
                  conversation_id: null,
                  messages: conversationGroup
                });
              }
              // Move startIndex to after the split message
              startIndex = splitIndex + 1;
            });

            // Add remaining messages after last split
            if (startIndex < userMessages.length) {
              const conversationGroup = userMessages.slice(startIndex);
              groupedConversations.push({
                user_id: uid,
                conversation_id: null,
                messages: conversationGroup
              });
            }
          }
        });

        return groupedConversations;
      }

      // Get the most recent message's created_at from a conversation
      function getLastMessageDate(conversation) {
        if (!conversation.messages || conversation.messages.length === 0) {
          return null;
        }
        
        // Find the most recent message (highest created_at)
        let mostRecent = conversation.messages[0];
        conversation.messages.forEach(msg => {
          const msgDate = new Date(msg.created_at).getTime();
          const mostRecentDate = new Date(mostRecent.created_at).getTime();
          if (msgDate > mostRecentDate) {
            mostRecent = msg;
          }
        });
        
        return mostRecent.created_at;
      }

      // Format date for display
      function formatCardDate(dateString) {
        if (!dateString) return "—";
        const date = new Date(dateString);
        if (Number.isNaN(date.valueOf())) {
          return dateString;
        }
        return date.toLocaleString("tr-TR", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit",
          hour12: false,
        });
      }

      // Global map for conversation status (from conversations table)
      let conversationStatusById = {};
      // Global map for aggregated feedback per conversation
      let conversationFeedbackByKey = {};
      // Global map for per-message feedback details (keyed by message_id)
      let messageFeedbackById = {};

      function getMessageIdFromRow(row) {
        if (!row) return "";
        const candidate = row.message_id ?? row.id ?? row.request_id ?? row.uuid;
        return candidate ? String(candidate) : "";
      }

      function openFeedbackModal({ rating, feedback }) {
        if (!feedbackModal) return;
        if (feedbackModalRating) {
          feedbackModalRating.textContent =
            typeof rating === "number" ? String(rating) : (rating ?? "—");
        }

        }
        feedbackModal.classList.add("show");
        feedbackModal.setAttribute("aria-hidden", "false");
      }

      function closeFeedbackModal() {
        if (!feedbackModal) return;
        feedbackModal.classList.remove("show");
        feedbackModal.setAttribute("aria-hidden", "true");
      }

      if (feedbackModalClose) {
        feedbackModalClose.addEventListener("click", closeFeedbackModal);
      }
      if (feedbackModal) {
        feedbackModal.addEventListener("click", closeFeedbackModal);
      }

      function setTickButtonState(btn, checked) {
        if (!btn) return;
        btn.classList.toggle("is-checked", !!checked);
        btn.setAttribute("aria-pressed", String(!!checked));
      }

      function setModalTickDisabled(disabled) {
        if (!messagesTickToggleBtn) return;
        messagesTickToggleBtn.disabled = !!disabled;
      }

      function getConversationStatus(conversationId) {
        if (!conversationId) return null;
        return conversationStatusById && conversationStatusById[conversationId]
          ? conversationStatusById[conversationId]
          : null;
      }

      function computeConversationCheckedState(conversation) {
        const conversationId = conversation && conversation.conversation_id ? conversation.conversation_id : null;
        const totalCount = conversation && conversation.messages ? conversation.messages.length : 0;
        const status = getConversationStatus(conversationId);

        if (!conversationId || !status || typeof status.last_checked_message_count !== "number") {
          return { checked: false, newMessages: 0, totalCount, conversationId };
        }

        if (status.last_checked_message_count === totalCount) {
          return { checked: true, newMessages: 0, totalCount, conversationId };
        }

        if (status.last_checked_message_count < totalCount) {
          return {
            checked: false,
            newMessages: Math.max(totalCount - status.last_checked_message_count, 0),
            totalCount,
            conversationId,
          };
        }

        return { checked: false, newMessages: 0, totalCount, conversationId };
      }

      function updateCardUIForConversation(conversationId) {
        if (!conversationId) return;
        const card = conversationsContainer.querySelector(
          `.conversation-card[data-conversation-id="${CSS.escape(conversationId)}"]`
        );
        if (!card) return;

        const totalCount = Number(card.getAttribute("data-conversation-count") || "0");
        const status = getConversationStatus(conversationId);

        let checked = false;
        let newMessages = 0;

        if (!status) {
          // Not found in conversations table => treat last_checked_message_count as 0
          newMessages = totalCount;
        } else if (typeof status.last_checked_message_count === "number") {
          if (status.last_checked_message_count === totalCount) {
            checked = true;
          } else if (status.last_checked_message_count < totalCount) {
            newMessages = Math.max(totalCount - status.last_checked_message_count, 0);
          }
        }

        const tickBtn = card.querySelector(".conversation-tick-btn");
        if (tickBtn) {
          tickBtn.classList.toggle("is-checked", checked);
        }

        // Update badge
        const existingBadge = card.querySelector(".conversation-new-messages");
        if (newMessages > 0) {
          if (existingBadge) {
            existingBadge.textContent = `+${newMessages} yeni mesaj`;
          } else {
            const badge = document.createElement("div");
            badge.className = "conversation-new-messages";
            badge.textContent = `+${newMessages} yeni mesaj`;
            const main = card.querySelector(".conversation-card-main");
            if (main) main.appendChild(badge);
          }
        } else if (existingBadge) {
          existingBadge.remove();
        }
      }

      async function markConversationChecked(conversationId, conversationCount) {
        // Implement the requested "upsert" behavior:
        // - If row doesn't exist: INSERT (omit checked_at so DB default applies)
        // - If row exists (conflict): UPDATE last_checked_message_count + checked_at=now()

        const insertPayload = {
          conversation_id: conversationId,
          last_checked_message_count: conversationCount,
        };

        const { error: insertError } = await supabaseClient.from("conversations").insert([insertPayload]);

        if (!insertError) {
          // Insert success
          conversationStatusById[conversationId] = {
            checked_at: null,
            last_checked_message_count: conversationCount,
          };
          return;
        }

        // If insert failed because it already exists, do the conflict update.
        // PostgREST/Supabase may represent uniqueness errors as 409 or code 23505.
        const isConflict =
          insertError.code === "23505" ||
          insertError.status === 409 ||
          (typeof insertError.message === "string" && insertError.message.toLowerCase().includes("duplicate")) ||
          (typeof insertError.details === "string" && insertError.details.toLowerCase().includes("already exists"));

        if (!isConflict) {
          throw insertError;
        }

        const nowIso = new Date().toISOString(); // timestamptz-safe
        const { error: updateError } = await supabaseClient
          .from("conversations")
          .update({
            last_checked_message_count: conversationCount,
            checked_at: nowIso,
          })
          .eq("conversation_id", conversationId);
        if (updateError) throw updateError;

        conversationStatusById[conversationId] = {
          checked_at: nowIso,
          last_checked_message_count: conversationCount,
        };
      }

      async function markConversationUnchecked(conversationId) {
        // Only update last_checked_message_count to 0 (leave checked_at untouched)
        const { error } = await supabaseClient
          .from("conversations")
          .update({ last_checked_message_count: 0 })
          .eq("conversation_id", conversationId);
        if (error) throw error;

        if (!conversationStatusById[conversationId]) {
          conversationStatusById[conversationId] = { checked_at: null, last_checked_message_count: 0 };
        } else {
          conversationStatusById[conversationId].last_checked_message_count = 0;
        }
      }

      async function handleConversationCheckToggle(conversation) {
        const state = computeConversationCheckedState(conversation);
        if (!state.conversationId) return;

        // Disable buttons during request
        if (messagesTickToggleBtn) messagesTickToggleBtn.disabled = true;
        const cardTick = conversationsContainer.querySelector(
          `.conversation-card[data-conversation-id="${CSS.escape(state.conversationId)}"] .conversation-tick-btn`
        );
        if (cardTick) cardTick.disabled = true;

        try {
          if (!state.checked) {
            await markConversationChecked(state.conversationId, state.totalCount);
          } else {
            await markConversationUnchecked(state.conversationId);
          }

          // Update modal tick (if open for same conversation)
          if (
            currentModalConversation &&
            currentModalConversation.conversation_id === state.conversationId &&
            messagesTickToggleBtn
          ) {
            const newState = computeConversationCheckedState(currentModalConversation);
            setTickButtonState(messagesTickToggleBtn, newState.checked);
          }

          // Update card UI
          updateCardUIForConversation(state.conversationId);
        } catch (err) {
          console.error("Failed to toggle conversation checked state:", err);
          statusBanner.textContent = `Checkbox update failed: ${err?.message || err}`;
        } finally {
          if (messagesTickToggleBtn) messagesTickToggleBtn.disabled = false;
          if (cardTick) cardTick.disabled = false;
        }
      }

      // Render conversation cards
      function renderConversations(conversations, statusMap, feedbackMap) {
        conversationStatusById = statusMap || {};
        conversationFeedbackByKey = feedbackMap || {};

        if (!conversations || conversations.length === 0) {
          conversationsContainer.innerHTML = `
            <div class="empty-state">
              <p>Sonuç bulunamadı.</p>
            </div>
          `;
          return;
        }

        // Sort conversations by most recent message's created_at (newest first)
        const sortedConversations = [...conversations].sort((a, b) => {
          const dateA = getLastMessageDate(a);
          const dateB = getLastMessageDate(b);
          
          if (!dateA && !dateB) return 0;
          if (!dateA) return 1; // Put conversations without dates at the end
          if (!dateB) return -1;
          
          const timeA = new Date(dateA).getTime();
          const timeB = new Date(dateB).getTime();
          return timeB - timeA; // Descending (newest first)
        });

        conversationsContainer.innerHTML = sortedConversations.map((conv, index) => {
          // Store conversation data as JSON in data attribute

          if (conv.conversation_id) {
            if (statusMap && statusMap[conv.conversation_id]) {

              if (lastChecked !== null) {

          return `
            <div class="conversation-card"
                 data-conversation='${convDataJson.replace(/'/g, "&#39;")}'

                 data-conversation-key="${convKey}">
              <div class="conversation-card-top-row">
                <div class="conversation-card-main">
                  <div class="conversation-label">En Son Kullanım Tarihi</div>
                  <div class="conversation-last-used">${formattedDate}</div>
                  ${(thumbsUpTrue > 0 || thumbsUpFalse > 0 || hasFeedback) ? `
                    <div class="conversation-feedback-row">
                      ${thumbsUpTrue > 0 ? `<span class="thumb-badge thumb-up" title="Thumbs up">👍 ${thumbsUpTrue}</span>` : ``}
                      ${thumbsUpFalse > 0 ? `<span class="thumb-badge thumb-down" title="Thumbs down">👎 ${thumbsUpFalse}</span>` : ``}
                      ${hasFeedback ? `<span class="feedback-icon" title="Feedback var">📝</span>` : ``}
                    </div>
                  ` : ``}
                </div>
                <button
                  class="conversation-tick-btn${isChecked ? " is-checked" : ""}"
                  type="button"
                  aria-hidden="true"
                  ${conv.conversation_id ? "" : "disabled"}
                ></button>
              </div>
              <div class="conversation-card-main">
                <div class="conversation-label">User ID</div>
                <div class="conversation-value">${conv.user_id || "—"}</div>
                <div class="conversation-label">Conversation ID</div>
                <div class="conversation-value">${conv.conversation_id || "—"}</div>
                <div class="conversation-count">${totalCount}</div>
                <div class="conversation-subtitle">Mesaj sayısı</div>
                ${newMessages > 0 ? `<div class="conversation-new-messages">+${newMessages} yeni mesaj</div>` : ""}
              </div>

          `;
        }).join("");

        // Add click handlers to conversation cards
        const cards = conversationsContainer.querySelectorAll(".conversation-card[data-conversation]");
        cards.forEach(card => {
          card.addEventListener("click", () => {
            const convDataJson = card.getAttribute("data-conversation");

        // Scroll to bottom

                popup.style.left = `${left}px`;

              conversationModalBody.querySelectorAll(".ai-flow-popup.show").forEach(p => {

        feedbackButtons.forEach((btn) => {
          btn.addEventListener("click", (e) => {

          });

        // Add click handlers for close buttons
        const closeButtons = conversationModalBody.querySelectorAll(".ai-flow-popup-close");
        closeButtons.forEach(btn => {
          btn.addEventListener("click", (e) => {

            const popupId = btn.getAttribute("data-close-popup");
            const popup = document.getElementById(popupId);

              popup.classList.remove("show");

          });

        // Close popups when clicking outside
        conversationModalBody.addEventListener("click", (e) => {
          if (!e.target.closest(".ai-flow-popup") && !e.target.closest(".ai-flow-btn")) {

              popup.classList.remove("show");

        // Sync header tick state with conversation status + disable if no conversation_id
        if (messagesTickToggleBtn) {

          setTickButtonState(messagesTickToggleBtn, state.checked);
          setModalTickDisabled(!state.conversationId);
        }

        // Show modal and lock body scroll
        conversationModal.classList.add("show");

      }

      // Close modal when clicking outside
      conversationModal.addEventListener("click", (e) => {
        if (e.target === conversationModal) {
          conversationModal.classList.remove("show");
          document.body.classList.remove("modal-open");
        }
      });

      // Function to close modal
      function closeConversationModal() {
        conversationModal.classList.remove("show");
        document.body.classList.remove("modal-open");
      }

      // Escape HTML to prevent XSS
      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      // Colorize JSON for better readability (IDE-style)
      function colorizeJson(jsonString) {
        try {
          // First, format the JSON with proper indentation
          const parsed = JSON.parse(jsonString);
          const formatted = JSON.stringify(parsed, null, 2);
          
          // Escape HTML first
          let escaped = escapeHtml(formatted);
          
          // Process in order to avoid conflicts
          // 1. Handle brackets and braces first (before other processing)
          escaped = escaped.replace(/([{}[\]])/g, '<span class="json-punctuation">$1</span>');
          
          // 2. Handle commas (before other value processing)
          escaped = escaped.replace(/,/g, '<span class="json-punctuation">,</span>');
          
          // 3. Handle keys (quoted strings followed by colored colon)
          escaped = escaped.replace(/"([^"]+)":/g, '<span class="json-key">"$1"</span><span class="json-punctuation">:</span>');
          
          // 4. Handle string values (quoted strings that aren't already keys)
          // Match: : "value" pattern (after our colored colon)
          escaped = escaped.replace(/(<span class="json-punctuation">:\s*<\/span>)\s*"([^"]*)"/g, '$1 <span class="json-string">"$2"</span>');
          // Handle array string values (standalone quoted strings)
          escaped = escaped.replace(/(^\s+)"([^"]*)"(?=\s*<span class="json-punctuation">[,}\]])/gm, (match, indent, value, offset, str) => {
            // Check if this line already has json-key (meaning it's a key, not a value)
            const lineStart = str.lastIndexOf('\n', offset);
            const lineEnd = str.indexOf('\n', offset);
            const line = str.substring(lineStart, lineEnd === -1 ? str.length : lineEnd);
            if (line.includes('json-key')) return match;
            return indent + '<span class="json-string">"' + value + '"</span>';
          });
          
          // 5. Handle numbers (after strings)
          escaped = escaped.replace(/(<span class="json-punctuation">:\s*<\/span>)\s*(-?\d+\.?\d*)(?=\s*<span class="json-punctuation">[,}\]])/g, '$1 <span class="json-number">$2</span>');
          escaped = escaped.replace(/(^\s+)(-?\d+\.?\d*)(?=\s*<span class="json-punctuation">[,}\]])/gm, '$1<span class="json-number">$2</span>');
          
          // 6. Handle booleans
          escaped = escaped.replace(/(<span class="json-punctuation">:\s*<\/span>)\s*(true|false)(?=\s*<span class="json-punctuation">[,}\]])/g, '$1 <span class="json-boolean">$2</span>');
          escaped = escaped.replace(/(^\s+)(true|false)(?=\s*<span class="json-punctuation">[,}\]])/gm, '$1<span class="json-boolean">$2</span>');
          
          // 7. Handle null
          escaped = escaped.replace(/(<span class="json-punctuation">:\s*<\/span>)\s*(null)(?=\s*<span class="json-punctuation">[,}\]])/g, '$1 <span class="json-null">$2</span>');
          escaped = escaped.replace(/(^\s+)(null)(?=\s*<span class="json-punctuation">[,}\]])/gm, '$1<span class="json-null">$2</span>');
          
          return escaped;
        } catch (e) {
          // If JSON parsing fails, return escaped version
          return escapeHtml(jsonString);
        }
      }

      // Format date for message timestamp
      function formatMessageTimestamp(dateString) {
        if (!dateString) return "";
        const date = new Date(dateString);
        if (Number.isNaN(date.valueOf())) {
          return dateString;
        }
        return date.toLocaleString("tr-TR", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit",
          hour12: false,
        });
      }

      function conversationHasAgentFlow(conv) {
        if (!conv || !conv.messages) return false;
        return conv.messages.some((msg) => {
          if (!msg) return false;
          const f = msg.agent_flow;
          return f !== null && f !== undefined && f !== "";
        });
      }

      /** OR across selected feedback filters; if none selected, pass all. */
      function matchesOrFeedbackFilters(conv, feedbackAggByKey) {
        const wantUp = filterThumbsUpEl && filterThumbsUpEl.checked;
        const wantDown = filterThumbsDownEl && filterThumbsDownEl.checked;
        const wantFlow = filterAgentFlowEl && filterAgentFlowEl.checked;
        const wantFb = filterFeedbackTextEl && filterFeedbackTextEl.checked;
        if (!wantUp && !wantDown && !wantFlow && !wantFb) return true;

        const key = conv.__key;
        const agg = (feedbackAggByKey && key && feedbackAggByKey[key]) ? feedbackAggByKey[key] : {};
        const hasUp = (agg.thumbsUpTrue || 0) > 0;
        const hasDown = (agg.thumbsUpFalse || 0) > 0;
        const hasWritten = !!agg.hasFeedback;
        const hasFlow = conversationHasAgentFlow(conv);

        if (wantUp && hasUp) return true;
        if (wantDown && hasDown) return true;
        if (wantFlow && hasFlow) return true;
        if (wantFb && hasWritten) return true;
        return false;
      }

      function isUnreadConversation(conv, statusMap) {
        const totalCount = conv.messages ? conv.messages.length : 0;
        const convId = conv.conversation_id;
        if (!convId || String(convId).trim() === "") return true;
        const status = statusMap[convId];
        if (!status || typeof status.last_checked_message_count !== "number") return true;
        return status.last_checked_message_count !== totalCount;
      }

      /** Row matches selected OR feedback filters (thumbs / written feedback). */
      function feedbackRowMatchesOrFilters(row, wantUp, wantDown, wantFb) {
        if (wantUp && row.thumbs_up === true) return true;
        if (wantDown && row.thumbs_up === false) return true;
        if (wantFb && row.feedback !== null && typeof row.feedback === "string" && row.feedback.trim() !== "") {
          return true;
        }
        return false;
      }

      /** Query general_message_feedback first; return matching rows + message_ids. */
      async function fetchGeneralMessageFeedbackForOrFilters(wantUp, wantDown, wantFb) {
        if (!wantUp && !wantDown && !wantFb) return { rows: [], messageIds: [] };

        let allRows = [];
        let from = 0;
        const pageSize = 1000;

        function buildFeedbackOrQuery() {
          let q = supabaseClient
            .from("general_message_feedback")
            .select("message_id, thumbs_up, feedback");
          if (wantUp && !wantDown && !wantFb) {
            q = q.eq("thumbs_up", true);
          } else if (!wantUp && wantDown && !wantFb) {
            q = q.eq("thumbs_up", false);
          } else if (!wantUp && !wantDown && wantFb) {
            q = q.not("feedback", "is", null);
          } else {
            const parts = [];
            if (wantUp) parts.push("thumbs_up.eq.true");
            if (wantDown) parts.push("thumbs_up.eq.false");
            if (wantFb) parts.push("feedback.not.is.null");
            q = q.or(parts.join(","));
          }
          return q;
        }

        while (true) {
          const { data, error } = await buildFeedbackOrQuery().range(from, from + pageSize - 1);
          if (error) throw error;
          if (!data || data.length === 0) break;
          allRows = allRows.concat(data);
          if (data.length < pageSize) break;
          from += pageSize;
        }

        const rows = (allRows || []).filter((row) => feedbackRowMatchesOrFilters(row, wantUp, wantDown, wantFb));
        const messageIds = [...new Set(rows.map((r) => r.message_id).filter(Boolean).map(String))];
        return { rows, messageIds };
      }

      async function fetchRequestsByMessageIds(messageIds, conversationIdFilter, userIdFilter) {
        if (!messageIds.length) return [];
        const out = [];
        const chunkSize = 200;
        for (let i = 0; i < messageIds.length; i += chunkSize) {
          const chunk = messageIds.slice(i, i + chunkSize);
          const runIn = async (column) => {
            let q = supabaseClient.from("requests").select("*").in(column, chunk);
            if (conversationIdFilter) q = q.eq("conversation_id", conversationIdFilter);
            if (userIdFilter) q = q.eq("user_id", userIdFilter);
            return q;
          };
          // Önce message_id (çoğu şemada feedback bu sütuna yazar); yoksa / hata olursa id (PK) dene
          let { data, error } = await runIn("message_id");
          if (error) {
            const { data: data2, error: err2 } = await runIn("id");
            if (err2) {
              throw new Error(
                (error.message || String(error)) + " | id sorgusu: " + (err2.message || String(err2))
              );
            }
            data = data2;
          }
          out.push(...(data || []));
        }
        return out;
      }

      function requestRowKey(row) {
        if (!row) return "";
        if (row.id !== undefined && row.id !== null) return `id:${String(row.id)}`;
        return `mid:${String(row.message_id || "")}`;
      }

      /** Expand seed request rows to full threads (same conversation_id or full user history for noid). */
      async function expandRequestsFromSeedRows(seedRows, conversationIdFilter, userIdFilter) {
        if (!seedRows.length) return [];

        const seen = new Map();
        const add = (rows) => {
          (rows || []).forEach((r) => {
            const k = requestRowKey(r);
            if (k && !seen.has(k)) seen.set(k, r);
          });
        };
        add(seedRows);

        const convIds = [
          ...new Set(
            seedRows.map((r) => r.conversation_id).filter((id) => id && String(id).trim() !== "")
          ),
        ];
        const noidUserIds = [
          ...new Set(
            seedRows
              .filter((r) => !r.conversation_id || String(r.conversation_id).trim() === "")
              .map((r) => r.user_id)
              .filter((u) => u !== null && u !== undefined && String(u).trim() !== "")
          ),
        ];

        const chunkSize = 200;

        if (convIds.length) {
          for (let i = 0; i < convIds.length; i += chunkSize) {
            const chunk = convIds.slice(i, i + chunkSize);
            let q = supabaseClient.from("requests").select("*").in("conversation_id", chunk);
            if (userIdFilter) q = q.eq("user_id", userIdFilter);
            const { data, error } = await q.order("created_at", { ascending: false });
            if (error) throw error;
            add(data);
          }
        }

        if (noidUserIds.length) {
          for (let i = 0; i < noidUserIds.length; i += chunkSize) {
            const chunk = noidUserIds.slice(i, i + chunkSize);
            let q = supabaseClient.from("requests").select("*").in("user_id", chunk);
            if (conversationIdFilter) q = q.eq("conversation_id", conversationIdFilter);
            const { data, error } = await q.order("created_at", { ascending: false });
            if (error) throw error;
            add(data);
          }
        }

        return Array.from(seen.values());
      }

      async function fetchRequestsAgentFlowRows(conversationIdFilter, userIdFilter) {
        let q = supabaseClient.from("requests").select("*").not("agent_flow", "is", null);
        if (conversationIdFilter) q = q.eq("conversation_id", conversationIdFilter);
        if (userIdFilter) q = q.eq("user_id", userIdFilter);
        const { data, error } = await q.order("created_at", { ascending: false });
        if (error) throw error;
        return data || [];
      }

      function mergeRequestRowsUnique(a, b) {
        const seen = new Map();
        [...a, ...b].forEach((r) => {
          const k = requestRowKey(r);
          if (k && !seen.has(k)) seen.set(k, r);
        });
        return Array.from(seen.values());
      }

      function applyFeedbackRowToMaps(row, messageIdToConvKey, feedbackAggByKey) {
        const mid = row && row.message_id ? String(row.message_id) : "";
        if (!mid) return;
        const key = messageIdToConvKey[mid];
        if (!key) return;

        if (!feedbackAggByKey[key]) {
          feedbackAggByKey[key] = { thumbsUpTrue: 0, thumbsUpFalse: 0, hasFeedback: false };
        }
        if (row.thumbs_up === true) feedbackAggByKey[key].thumbsUpTrue += 1;
        if (row.thumbs_up === false) feedbackAggByKey[key].thumbsUpFalse += 1;
        if (row.feedback !== null && typeof row.feedback === "string" && row.feedback.trim() !== "") {
          feedbackAggByKey[key].hasFeedback = true;
        }
        if (!messageFeedbackById[mid]) {
          messageFeedbackById[mid] = { hasUp: false, hasDown: false, feedback: null, rating: null };
        }
        if (row.thumbs_up === true) messageFeedbackById[mid].hasUp = true;
        if (row.thumbs_up === false) messageFeedbackById[mid].hasDown = true;
        if (row.feedback !== null && typeof row.feedback === "string" && row.feedback.trim() !== "") {
          messageFeedbackById[mid].feedback = row.feedback;
          messageFeedbackById[mid].rating = row.rating;
        }
      }

      /** Load feedback for given message_ids (optional prefetched rows from search step to avoid duplicate fetches). */
      async function loadFeedbackForMessageIds(messageIdToConvKey, uniqueMessageIds, prefetchedFeedbackRows) {
        let feedbackAggByKey = {};
        messageFeedbackById = {};
        const ids = Array.from(uniqueMessageIds);
        if (!ids.length) return feedbackAggByKey;

        const prefetched = prefetchedFeedbackRows || [];
        prefetched.forEach((row) => applyFeedbackRowToMaps(row, messageIdToConvKey, feedbackAggByKey));

        const prefetchedIds = new Set(prefetched.map((r) => (r && r.message_id ? String(r.message_id) : "")).filter(Boolean));
        const idsToFetch = ids.filter((id) => !prefetchedIds.has(id));
        const chunkSize = 500;
        for (let i = 0; i < idsToFetch.length; i += chunkSize) {
          const chunk = idsToFetch.slice(i, i + chunkSize);
          const { data: fbData, error: fbError } = await supabaseClient
            .from("general_message_feedback")
            .select("thumbs_up, feedback, message_id")
            .in("message_id", chunk);

          if (fbError) {
            console.error("Feedback query error:", fbError);
            continue;
          }
          (fbData || []).forEach((row) => applyFeedbackRowToMaps(row, messageIdToConvKey, feedbackAggByKey));
        }
        return feedbackAggByKey;
      }

      // Perform search with filters
      async function performSearch() {
        try {
          statusBanner.textContent = "Aranıyor...";
          searchBtn.disabled = true;

          const conversationId = conversationIdFilter.value.trim();
          const userId = userIdFilter.value.trim();

          const wantUp = filterThumbsUpEl && filterThumbsUpEl.checked;
          const wantDown = filterThumbsDownEl && filterThumbsDownEl.checked;
          const wantFb = filterFeedbackTextEl && filterFeedbackTextEl.checked;
          const wantAgentFlow = filterAgentFlowEl && filterAgentFlowEl.checked;
          const wantFeedbackOr = wantUp || wantDown || wantFb;

          let data = [];
          let prefetchedFeedbackRows = null;

          if (wantFeedbackOr && wantAgentFlow) {
            const fb = await fetchGeneralMessageFeedbackForOrFilters(wantUp, wantDown, wantFb);
            prefetchedFeedbackRows = fb.rows;
            let fromFeedback = [];
            if (fb.messageIds.length) {
              const seeds = await fetchRequestsByMessageIds(fb.messageIds, conversationId, userId);
              fromFeedback = await expandRequestsFromSeedRows(seeds, conversationId, userId);
            }
            const fromFlow = await fetchRequestsAgentFlowRows(conversationId, userId);
            data = mergeRequestRowsUnique(fromFeedback, fromFlow);
          } else if (wantFeedbackOr) {
            const fb = await fetchGeneralMessageFeedbackForOrFilters(wantUp, wantDown, wantFb);
            prefetchedFeedbackRows = fb.rows;
            if (!fb.messageIds.length) {
              data = [];
            } else {
              const seeds = await fetchRequestsByMessageIds(fb.messageIds, conversationId, userId);
              data = await expandRequestsFromSeedRows(seeds, conversationId, userId);
            }
          } else if (wantAgentFlow) {
            data = await fetchRequestsAgentFlowRows(conversationId, userId);
          } else {
            let query = supabaseClient.from("requests").select("*").order("created_at", { ascending: false });
            if (conversationId) query = query.eq("conversation_id", conversationId);
            if (userId) query = query.eq("user_id", userId);
            const { data: rows, error } = await query;
            if (error) {
              console.error("Query error:", error);
              statusBanner.textContent = "Hata: " + error.message;
              return;
            }
            data = rows || [];
          }

          // Group conversations
          const groupedConversations = groupConversations(data);
          groupedConversations.forEach((conv, idx) => {
            const firstMsgId = conv.messages && conv.messages[0] ? getMessageIdFromRow(conv.messages[0]) : "";
            conv.__key = conv.conversation_id || `noid-${conv.user_id || "user"}-${firstMsgId || idx}`;
          });

          // Load conversations status table once (small table), then filter in-memory
          let statusMap = {};
          {
            const { data: statusData, error: statusError } = await supabaseClient
              .from("conversations")
              .select("conversation_id, checked_at, last_checked_message_count");

            if (statusError) {
              console.error("Conversations status query error:", statusError);
            } else {
              (statusData || []).forEach((row) => {
                if (row && row.conversation_id) {
                  statusMap[row.conversation_id] = {
                    checked_at: row.checked_at,
                    last_checked_message_count: row.last_checked_message_count,
                  };
                }
              });
            }
          }

          const messageIdToConvKey = {};
          const allMessageIds = [];
          groupedConversations.forEach((conv) => {
            const key = conv.__key;
            (conv.messages || []).forEach((msg) => {
              const mid = getMessageIdFromRow(msg);
              if (!mid) return;
              messageIdToConvKey[mid] = key;
              allMessageIds.push(mid);
            });
          });

          const uniqueMessageIds = new Set(allMessageIds);
          const feedbackAggByKey = await loadFeedbackForMessageIds(
            messageIdToConvKey,
            uniqueMessageIds,
            prefetchedFeedbackRows
          );

          // OR filters: when only feedback checkboxes, requests are already scoped via message_id; combine with AI Flow needs filter
          const unreadOnlyEnabled = unreadOnlyFilter ? unreadOnlyFilter.checked : false;
          let list = groupedConversations;
          const orFiltersActive = wantUp || wantDown || wantAgentFlow || wantFb;
          if (orFiltersActive && (wantAgentFlow || !wantFeedbackOr)) {
            list = list.filter((conv) => matchesOrFeedbackFilters(conv, feedbackAggByKey));
          }
          if (unreadOnlyEnabled) {
            list = list.filter((conv) => isUnreadConversation(conv, statusMap));
          }
          const filteredConversations = list;

          // Log results to console
          console.log("Raw search results:", data);
          console.log("Grouped conversations:", groupedConversations);
          console.log("Conversation status map:", statusMap);
          console.log("Conversation feedback map:", feedbackAggByKey);
          console.log("Total conversations:", filteredConversations.length);

          // Render conversations with status map
          renderConversations(filteredConversations, statusMap, feedbackAggByKey);

          // Update status
          const resultCount = filteredConversations.length;
          statusBanner.textContent = `${resultCount} sohbet bulundu.`;
        } catch (error) {
          console.error("Search error:", error);
          const detail =
            (error && (error.message || error.error_description || error.hint)) ||
            (typeof error === "string" ? error : "");
          statusBanner.textContent = detail
            ? "Arama hatası: " + detail
            : "Arama sırasında bir hata oluştu.";
        } finally {
          searchBtn.disabled = false;
        }
      }

      // Update URL with current filter values
      function updateURL() {
        const conversationId = conversationIdFilter.value.trim();
        const userId = userIdFilter.value.trim();
        const unreadOnly = unreadOnlyFilter ? unreadOnlyFilter.checked : false;
        const orFu = filterThumbsUpEl && filterThumbsUpEl.checked;
        const orFd = filterThumbsDownEl && filterThumbsDownEl.checked;
        const orFlow = filterAgentFlowEl && filterAgentFlowEl.checked;
        const orFb = filterFeedbackTextEl && filterFeedbackTextEl.checked;

        const urlParams = new URLSearchParams();
        if (conversationId) {
          urlParams.set("conversation_id", conversationId);
        }
        if (userId) {
          urlParams.set("user_id", userId);
        }
        if (unreadOnly) {
          urlParams.set("unread_only", "1");
        }
        if (orFu) urlParams.set("or_fu", "1");
        if (orFd) urlParams.set("or_fd", "1");
        if (orFlow) urlParams.set("or_flow", "1");
        if (orFb) urlParams.set("or_fb", "1");

        const newURL = urlParams.toString()
          ? `${window.location.pathname}?${urlParams.toString()}`
          : window.location.pathname;

        window.history.pushState({}, "", newURL);
      }

      // Event listeners
      searchBtn.addEventListener("click", () => {
        updateURL();
        performSearch();
      });

      // Allow Enter key to trigger search
      conversationIdFilter.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          updateURL();
          performSearch();
        }
      });

      userIdFilter.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          updateURL();
          performSearch();
        }
      });

      signOutBtn.addEventListener("click", async () => {
        await supabaseClient.auth.signOut();
        window.location.href = "/";
      });

      refreshBtn.addEventListener("click", () => {
        performSearch();
      });

      // Initialize: Read URL parameters on page load
      readURLParameters();
    </script>
  </body>
</html>
